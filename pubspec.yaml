name: sahaj
description: "Sahaj — train steady. Men's sexual wellness training app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local storage
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  flutter_secure_storage: ^9.2.2

  # Firebase (init deferred until firebase_options.dart generated via flutterfire CLI)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.2.0
  firebase_remote_config: ^5.1.4

  # Observability (init deferred until DSN/keys provided)
  sentry_flutter: ^8.11.0
  mixpanel_flutter: ^2.3.4

  # Subscriptions (init deferred until RevenueCat API key)
  purchases_flutter: ^8.2.1

  # Audio
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  audio_service: ^0.18.16

  # Codegen + utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.1
  wakelock_plus: ^1.2.8
  local_auth: ^2.3.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.4

  # Local notifications (daily reminder — exact alarms for reliable delivery)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/content/sessions.json
    - assets/content/articles.json
    - assets/audio/
    - assets/images/

  # Bundled type (Lamplight A3) — no runtime font fetch; the app stays
  # fully offline. Fraunces = display + numerals, Manrope = UI/body.
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-300.ttf
          weight: 300
        - asset: assets/fonts/Fraunces-400Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Fraunces-500.ttf
          weight: 500
        - asset: assets/fonts/Fraunces-600.ttf
          weight: 600
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-400.ttf
          weight: 400
        - asset: assets/fonts/Manrope-500.ttf
          weight: 500
        - asset: assets/fonts/Manrope-600.ttf
          weight: 600
        - asset: assets/fonts/Manrope-700.ttf
          weight: 700
        - asset: assets/fonts/Manrope-800.ttf
          weight: 800
