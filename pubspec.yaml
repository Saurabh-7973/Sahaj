name: sahaj
description: "Sahaj — train steady. Men's sexual wellness training app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local storage
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  flutter_secure_storage: ^9.2.2

  # Firebase (init deferred until firebase_options.dart generated via flutterfire CLI)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.2.0
  firebase_remote_config: ^5.1.4

  # Observability (init deferred until DSN/keys provided)
  sentry_flutter: ^8.11.0
  mixpanel_flutter: ^2.3.4

  # Subscriptions (init deferred until RevenueCat API key)
  purchases_flutter: ^8.2.1

  # Audio
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  audio_service: ^0.18.16

  # Codegen + utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.1
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4+3
  local_auth: ^2.3.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/content/sessions.json
